<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>실시간 수열 문제 대시보드</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #1e293b; color: white; padding: 20px; }
        h1 { text-align: center; color: #38bdf8; font-size: 36px; margin-bottom: 30px; }
        
        #dashboard-board { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); 
            gap: 20px; 
            padding: 20px; 
        }
        
        /* 포스트잇 느낌의 카드 디자인 */
        .post-it-card { 
            background-color: #fef08a; 
            color: #333; 
            padding: 20px; 
            border-radius: 2px 15px 15px 15px; 
            box-shadow: 3px 3px 10px rgba(0,0,0,0.3);
            position: relative;
        }
        .post-it-card::before {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 25px;
            background: rgba(0,0,0,0.05); border-radius: 2px 15px 0 0;
        }
        .card-header { font-weight: bold; font-size: 18px; margin-bottom: 5px; color: #1e3a8a; }
        .card-tag { display: inline-block; background: #3b82f6; color: white; padding: 3px 8px; border-radius: 12px; font-size: 12px; margin-bottom: 10px; }
        .card-body { font-size: 16px; margin-bottom: 15px; line-height: 1.4; }
        .card-footer { font-weight: bold; color: #b91c1c; font-size: 15px; border-top: 1px dashed #ca8a04; padding-top: 10px; }
        
        .loading { text-align: center; font-size: 20px; color: #94a3b8; }
    </style>
</head>
<body>

    <h1>✨ 2학년 학생 출제 수열 문제 게시판</h1>
    <div id="dashboard-board">
        <div class="loading">데이터를 불러오는 중입니다...</div>
    </div>

    <script>
        const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzolSYD9hYYsjmr0iefz9Uh1l2rkNtMvL5TOoYd8_iVpjPsnZaLNBTLxnVVLg0PQXWb/exec";

        function fetchDashboardData() {
            fetch(GAS_WEB_APP_URL)
            .then(response => response.json())
            .then(data => {
                const board = document.getElementById("dashboard-board");
                board.innerHTML = ""; 
                
                // 최신 데이터가 위로 오도록 배열을 뒤집습니다.
                const reversedData = data.reverse();

                reversedData.forEach(item => {
                    const card = document.createElement("div");
                    card.className = "post-it-card";
                    card.innerHTML = `
                        <div class="card-header">${item.studentId} ${item.studentName}</div>
                        <div class="card-tag">${item.category}</div>
                        <div class="card-body">${item.question}</div>
                        <div class="card-footer">정답: ${item.answer}</div>
                    `;
                    board.appendChild(card);
                });
                
                if(data.length === 0) {
                    board.innerHTML = "<div class='loading'>아직 제출된 문제가 없습니다.</div>";
                }
            })
            .catch(err => {
                console.error("데이터 로드 실패:", err);
            });
        }

        // 5초마다 새로고침
        setInterval(fetchDashboardData, 5000);
        window.onload = fetchDashboardData;
    </script>
</body>
</html>
